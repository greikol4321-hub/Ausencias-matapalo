        /* === MODAL EDITAR COMUNICADO PERSONALIZADO === */
        .cedit-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(3px);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            padding: 16px;
            animation: cedit-fadein 0.2s ease;
        }
        .cedit-overlay.active {
            display: flex;
        }
        @keyframes cedit-fadein {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        .cedit-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.22);
            width: 100%;
            max-width: 480px;
            overflow: hidden;
            animation: cedit-slidein 0.25s ease;

            from { transform: translateY(-20px); opacity: 0; }

        .cedit-header {
            background: #0a4c23;
            color: white;
            padding: 18px 24px;

            align-items: center;
            justify-content: space-between;

            font-weight: 700;
            letter-spacing: 0.01em;
        }

            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 1.3rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            transition: background 0.2s;
        }
        .cedit-close:hover { background: rgba(255,255,255,0.3); }
        .cedit-body {
            padding: 22px 24px 8px;
        }
        .cedit-group {
            margin-bottom: 16px;
        }
        .cedit-label {
            display: block;
            font-size: 0.78rem;
            font-weight: 700;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            margin-bottom: 6px;
        }
        .cedit-input,
        .cedit-textarea,
        .cedit-select {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #d0d7de;
            border-radius: 8px;
            font-size: 0.97rem;
            font-family: inherit;
            color: #222;
            background: #fafafa;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .cedit-input:focus,
        .cedit-textarea:focus,
        .cedit-select:focus {
            border-color: #0a4c23;
            box-shadow: 0 0 0 3px rgba(10, 76, 35, 0.12);
            outline: none;
            background: #fff;
        }
        .cedit-textarea { resize: vertical; min-height: 100px; }
        .cedit-select   { cursor: pointer; }
        .cedit-error {
            color: #c0392b;
            font-size: 0.88rem;
            margin: 0 0 8px;
            font-weight: 600;
        }
        .cedit-footer {
            padding: 16px 24px 22px;
            display: flex;
            gap: 12px;
        }
        .cedit-btn-cancel {
            flex: 1;
            padding: 11px 0;
            border-radius: 8px;
            border: 1.5px solid #d0d7de;
            background: #f5f5f5;
            color: #555;
            font-size: 0.97rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .cedit-btn-cancel:hover { background: #e8e8e8; }
        .cedit-btn-save {
            flex: 1;
            padding: 11px 0;
            border-radius: 8px;
            border: none;
            background: #0a4c23;
            color: white;
            font-size: 0.97rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .cedit-btn-save:hover { background: #0d6b32; transform: translateY(-1px); }
        .cedit-btn-save:disabled { background: #8aab94; cursor: not-allowed; transform: none; }
    </style>
    <!-- ===== MODAL EDITAR COMUNICADO (personalizado) ===== -->
    <div id="modalEditarCom" class="cedit-overlay" onclick="cerrarModalEditar(event)">
        <div class="cedit-card" onclick="event.stopPropagation()">
            <div class="cedit-header">
                <span><i class="fas fa-edit"></i> Editar Comunicado</span>
                <button class="cedit-close" onclick="cerrarModalEditar()" title="Cerrar">&times;</button>
            </div>
            <div class="cedit-body">
                <div class="cedit-group">
                    <label class="cedit-label" for="edit-titulo">Título</label>
                    <input type="text" id="edit-titulo" class="cedit-input" placeholder="Título del comunicado">
                </div>
                <div class="cedit-group">
                    <label class="cedit-label" for="edit-contenido">Contenido</label>
                    <textarea id="edit-contenido" class="cedit-textarea" rows="4" placeholder="Escriba el mensaje..."></textarea>
                </div>
                <div class="cedit-group">
                    <label class="cedit-label" for="edit-color">Tipo de comunicado</label>
                    <select id="edit-color" class="cedit-select">
                        <option value="#27ae60">🟢 Informativo (Verde)</option>
                        <option value="#3498db">🔵 General (Azul)</option>
                        <option value="#f39c12">🟡 Importante (Naranja)</option>
                        <option value="#e74c3c">🔴 Urgente (Rojo)</option>
                    </select>
                </div>
                <p id="edit-error" class="cedit-error" style="display:none;"></p>
            </div>
            <div class="cedit-footer">
                <button class="cedit-btn-cancel" onclick="cerrarModalEditar()">
                    <i class="fas fa-times"></i> Cancelar
                </button>
                <button class="cedit-btn-save" onclick="guardarEdicion()">
                    <i class="fas fa-save"></i> Guardar cambios
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
        // Manejar validaciones para asegurar que el código no se caiga
        try {
            emailjs.init({
                publicKey: "qAglmSdD5me55ae1-"
            });
        } catch (error) {
            console.error("Error configurando EmailJS:", error);
        }

        // 🔒 VERIFICACIÓN DE SESIÓN INMEDIATA
        if (!localStorage.getItem('usuario') || !localStorage.getItem('nombre')) {
            window.location.href = "registrarme.html";
        }

        const SUPABASE_URL = 'https://iowxlwnosyyqetbvvmuk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlvd3hsd25vc3l5cWV0YnZ2bXVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTk4NDYsImV4cCI6MjA5MTc3NTg0Nn0.VZ5VMu0z4nlsZ0hKvDSk4IUluA1yGx9eQCCXzDc5HmU';
        const headers = {
            "apikey": SUPABASE_KEY,
            "Authorization": `Bearer ${SUPABASE_KEY}`,
            "Content-Type": "application/json"
        };


        function inicializar() {
            const nombre = localStorage.getItem('nombre');
            const rol = localStorage.getItem('rol');
            const usuario = localStorage.getItem('usuario');

            console.log('🔍 Datos en localStorage:', {
                nombre,
                rol,
                usuario
            });

            if (!nombre || !usuario) {
                console.warn('⚠️ No hay datos de sesión, redirigiendo a index...');
                globalThis.location.href = "index.html";
                return;
            }

            // Si no es admin lo mandamos a docentes
            if (rol !== 'admin') {
                console.warn('⚠️ Usuario no es admin, redirigiendo a docentes...');
                globalThis.location.href = "docentes.html";
                return;
            }

            // Actualizar Textos
            console.log('✅ Actualizando interfaz con datos del usuario');
            document.getElementById('nombreUsuario').textContent = nombre;
            document.getElementById('usuario').textContent = usuario;
            document.getElementById('rol').textContent = rol;
            document.getElementById('rolBadge').textContent = rol;

            document.getElementById('rolBadge').style.background = '#b45309';
            setupComunicadoListener();
            cargarComunicadosAdmin();
        }



        // --- CARGAR COMUNICADOS ---
        async function cargarComunicadosAdmin() {
            const tbody = document.getElementById('cuerpoTabla');

            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/comunicados?order=creado_en.desc`, {
                    headers
                });
                const datos = await res.json();

                tbody.innerHTML = "";
                if (datos.length === 0) {
                    tbody.innerHTML = "<tr><td colspan='4' style='text-align:center; padding: 40px; color: var(--texto-gris);'><i class='fas fa-folder-open fa-2x' style='color: #ccc; margin-bottom:15px;'></i><br>No hay comunicados registrados.</td></tr>";
                    return;
                }

                datos.forEach(c => {
                    const date = new Date(c.creado_en);
                    const formattedDate = date.toLocaleDateString('es-CR');

                    tbody.innerHTML += `
                <tr>
                    <td><b>${formattedDate}</b></td>
                    <td>
                        <strong style="color: ${c.color_borde};">${c.titulo}</strong>
                        <div style="font-size: 0.85rem; margin-top: 6px; color: var(--texto-gris);">
                            ${c.contenido}
                        </div>
                    </td>
                    <td>${c.autor}</td>
                    <td style="text-align: center; display: flex; gap: 8px; justify-content: center;">
                        <button class="btn-editar-com" onclick="editarComunicado(${c.id}, '${c.titulo.replace(/'/g, "\\'")}', '${c.contenido.replace(/'/g, "\\'").replace(/\n/g, "\\n")}', '${c.color_borde}')" title="Editar este comunicado">
                            <i class="fas fa-edit"></i> Editar
                        </button>
                        <button class="btn-eliminar-com" onclick="eliminarComunicado(${c.id})" title="Eliminar este comunicado">
                            <i class="fas fa-trash-alt"></i> Eliminar
                        </button>
                    </td>
                </tr>`;
                });
            } catch (e) {
                console.error(e);
                tbody.innerHTML = "<tr><td colspan='4'>Error al cargar los comunicados.</td></tr>";
            }
        }

        async function eliminarComunicado(id) {
            const confirmacion = await Swal.fire({
                title: '¿Eliminar comunicado?',
                html: '<span style="color:#555;font-size:0.95rem;">Esta acción <b>no se puede deshacer</b> y el comunicado desaparecerá para todos los usuarios.</span>',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#e74c3c',
                cancelButtonColor: '#6c757d',
                confirmButtonText: '<i class="fas fa-trash-alt"></i>&nbsp; Sí, eliminar',
                cancelButtonText: 'Cancelar',
                reverseButtons: true,
                customClass: { popup: 'swal-popup-modern' }
            });

            if (!confirmacion.isConfirmed) return;

            Swal.fire({
                title: 'Eliminando...',
                text: 'Por favor espere un momento',
                allowOutsideClick: false,
                showConfirmButton: false,
                customClass: { popup: 'swal-popup-modern' },
                didOpen: () => { Swal.showLoading(); }
            });

            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/comunicados?id=eq.${id}`, {
                    method: "DELETE",
                    headers
                });
                if (res.ok) {
                    Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Comunicado eliminado', showConfirmButton: false, timer: 2500, timerProgressBar: true, customClass: { popup: 'swal-toast-modern' } });
                    cargarComunicadosAdmin();
                } else {
                    Swal.fire({ icon: 'error', title: 'Error', text: 'No se pudo eliminar: ' + res.statusText, confirmButtonColor: '#0a4c23', customClass: { popup: 'swal-popup-modern' } });
                }
            } catch (e) {
                Swal.fire({ icon: 'error', title: 'Error de conexión', text: 'Problema de conexión.', confirmButtonColor: '#0a4c23', customClass: { popup: 'swal-popup-modern' } });
            }
        }

        let _editId = null;

        function editarComunicado(id, tituloActual, contenidoActual, colorActual) {
            _editId = id;
            document.getElementById('edit-titulo').value = tituloActual;
            document.getElementById('edit-contenido').value = contenidoActual.replace(/\\n/g, '\n');
            document.getElementById('edit-color').value = colorActual;
            document.getElementById('edit-error').style.display = 'none';
            document.getElementById('modalEditarCom').classList.add('active');
            setTimeout(() => document.getElementById('edit-titulo').focus(), 100);
        }

        function cerrarModalEditar(event) {
            if (event && event.target !== document.getElementById('modalEditarCom')) return;
            document.getElementById('modalEditarCom').classList.remove('active');
            _editId = null;
        }

        async function guardarEdicion() {
            const titulo = document.getElementById('edit-titulo').value.trim();
            const contenido = document.getElementById('edit-contenido').value.trim();
            const color_borde = document.getElementById('edit-color').value;
            const errorEl = document.getElementById('edit-error');

            if (!titulo || !contenido) {
                errorEl.textContent = 'El título y el contenido son obligatorios.';
                errorEl.style.display = 'block';
                return;
            }
            errorEl.style.display = 'none';

            const btnSave = document.querySelector('.cedit-btn-save');
            btnSave.disabled = true;
            btnSave.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Guardando...';

            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/comunicados?id=eq.${_editId}`, {
                    method: 'PATCH',
                    headers,
                    body: JSON.stringify({ titulo, contenido, color_borde })
                });

                document.getElementById('modalEditarCom').classList.remove('active');

                if (res.ok) {
                    Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Comunicado actualizado', showConfirmButton: false, timer: 2500, timerProgressBar: true, customClass: { popup: 'swal-toast-modern' } });
                    cargarComunicadosAdmin();
                } else {
                    Swal.fire({ icon: 'error', title: 'Error', text: 'No se pudo actualizar el comunicado.', confirmButtonColor: '#0a4c23', customClass: { popup: 'swal-popup-modern' } });
                }
            } catch (e) {
                Swal.fire({ icon: 'error', title: 'Error de red', text: 'Problema de red al actualizar.', confirmButtonColor: '#0a4c23', customClass: { popup: 'swal-popup-modern' } });
            } finally {
                btnSave.disabled = false;
                btnSave.innerHTML = '<i class="fas fa-save"></i> Guardar cambios';
            }
        }

        function setupComunicadoListener() {
            const form = document.getElementById('formComunicado');
            if (form) {
                form.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    const btn = document.getElementById('btnPublicar');
                    btn.disabled = true;
                    const datos = {
                        titulo: document.getElementById('tituloCom').value,
                        contenido: document.getElementById('contenidoCom').value,
                        color_borde: document.getElementById('colorCom').value,
                        autor: localStorage.getItem('nombre')
                    };
                    try {
                        Swal.fire({
                            title: 'Publicando...',
                            text: 'Guardando el comunicado',
                            allowOutsideClick: false,
                            showConfirmButton: false,
                            customClass: { popup: 'swal-popup-modern' },
                            didOpen: () => { Swal.showLoading(); }
                        });
                        const res = await fetch(`${SUPABASE_URL}/rest/v1/comunicados`, {
                            method: "POST",
                            headers,
                            body: JSON.stringify(datos)
                        });
                        if (res.ok) {
                            Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Comunicado publicado', showConfirmButton: false, timer: 2500, timerProgressBar: true, customClass: { popup: 'swal-toast-modern' } });
                            this.reset();
                            cargarComunicadosAdmin(); // Reload the table automatically
                        } else {
                            const error = await res.json();
                            Swal.fire({ icon: 'error', title: 'Error al publicar', text: 'No se pudo publicar: ' + (error.message || res.statusText), confirmButtonColor: '#0a4c23', customClass: { popup: 'swal-popup-modern' } });
                        }
                    } catch (e) {
                        Swal.fire({ icon: 'error', title: 'Error', text: 'Error al publicar: ' + e.message, confirmButtonColor: '#0a4c23', customClass: { popup: 'swal-popup-modern' } });
                    }
                    btn.disabled = false;
                });
            }
        }

        async function cerrarSesion() {
            const confirmacion = await Swal.fire({
                title: '¿Cerrar Sesión?',
                text: '¿Seguro que desea salir del panel?',
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#0a4c23',
                cancelButtonColor: '#6c757d',
                confirmButtonText: '<i class="fas fa-sign-out-alt"></i>&nbsp; Sí, salir',
                cancelButtonText: 'Cancelar',
                reverseButtons: true,
                customClass: { popup: 'swal-popup-modern' }
            });

            if (confirmacion.isConfirmed) {
                localStorage.clear();
                globalThis.location.href = "index.html";
            }
        }

        window.onload = inicializar;

        // 🔎 FUNCIONALIDAD DE BUSQUEDA EN TABLA
        function filtrarTabla() {
            let input = document.getElementById("busquedaComunicados");
            let filter = input.value.toUpperCase();
            let table = document.getElementById("tablaComunicados");
            let tr = table.getElementsByTagName("tr");

            for (let i = 1; i < tr.length; i++) {
                let tds = tr[i].getElementsByTagName("td");
                let textDesde = tds.length > 0 ? (tds[0].textContent || tds[0].innerText) : "";
                let textMotivo = tds.length > 1 ? (tds[1].textContent || tds[1].innerText) : "";

                if (textMotivo.toUpperCase().indexOf(filter) > -1 || textDesde.toUpperCase().indexOf(filter) > -1) {
                    tr[i].style.display = "";
                } else {
                    tr[i].style.display = "none";
                }
            }
        }

        // ANIMACION DE OCULTAMIENTO EN CELULAR AL BAJAR
        let lastScrollY = window.scrollY;
        window.addEventListener('scroll', () => {
            if (window.innerWidth <= 600) {
                const btn = document.querySelector('.btn-cerrar');
                if (!btn) return;

                if (window.scrollY > lastScrollY && window.scrollY > 60) {
                    // Scroll hacia abajo: ocultar (animación de plegado)
                    btn.classList.add('hide-on-scroll');
                } else {
                    // Scroll hacia arriba o arriba del top: mostrar
                    btn.classList.remove('hide-on-scroll');
                }
            } else {
                // Restaurar si volviera mágicamente a desktop
                const btnX = document.querySelector('.btn-cerrar');
                if (btnX) btnX.classList.remove('hide-on-scroll');
            }
            lastScrollY = window.scrollY;
        });
    </script>
</body>

</html>
