        <h3><i class="fas fa-newspaper"></i> Comunicados Activos</h3>

                        </tr>
                    </thead>
                    <tbody id="cuerpoTabla">
                        <tr>
                            <td colspan="4" style="text-align:center; padding: 40px; color: var(--texto-gris);">
                                <i class="fas fa-spinner fa-spin fa-2x" style="color: var(--verde-claro); margin-bottom: 10px;"></i><br> Cargando sus registros...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div style="margin-top: 30px; text-align: center;">

    <script>
        // Manejar validaciones para asegurar que el código no se caiga
        try {

        } catch (error) {
            console.error("Error configurando EmailJS:", error);
        }

        // 🔒 VERIFICACIÓN DE SESIÓN INMEDIATA
        if (!localStorage.getItem('usuario') || !localStorage.getItem('nombre')) {
            window.location.href = "registrarme.html";
        }

        const SUPABASE_URL = 'https://iowxlwnosyyqetbvvmuk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlvd3hsd25vc3l5cWV0YnZ2bXVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTk4NDYsImV4cCI6MjA5MTc3NTg0Nn0.VZ5VMu0z4nlsZ0hKvDSk4IUluA1yGx9eQCCXzDc5HmU';
        const headers = {
            "apikey": SUPABASE_KEY,
            "Authorization": `Bearer ${SUPABASE_KEY}`,
            "Content-Type": "application/json"
        };


        function inicializar() {
            const nombre = localStorage.getItem('nombre');
            const rol = localStorage.getItem('rol');
            const usuario = localStorage.getItem('usuario');

            console.log('🔍 Datos en localStorage:', {
                nombre,
                rol,
                usuario
            });

            if (!nombre || !usuario) {
                console.warn('⚠️ No hay datos de sesión, redirigiendo a index...');
                globalThis.location.href = "index.html";
                return;
            }

            // Si no es admin lo mandamos a docentes
            if (rol !== 'admin') {
                console.warn('⚠️ Usuario no es admin, redirigiendo a docentes...');
                globalThis.location.href = "docentes.html";
                return;
            }

            // Actualizar Textos
            console.log('✅ Actualizando interfaz con datos del usuario');
            document.getElementById('nombreUsuario').textContent = nombre;
            document.getElementById('usuario').textContent = usuario;
            document.getElementById('rol').textContent = rol;
            document.getElementById('rolBadge').textContent = rol;

            document.getElementById('rolBadge').style.background = '#b45309';
            setupComunicadoListener();
            cargarComunicadosAdmin();
        }



        // --- CARGAR COMUNICADOS ---
        async function cargarComunicadosAdmin() {
            const tbody = document.getElementById('cuerpoTabla');

            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/comunicados?order=creado_en.desc`, {
                    headers
                });
                const datos = await res.json();

                tbody.innerHTML = "";
                if (datos.length === 0) {
                    tbody.innerHTML = "<tr><td colspan='4' style='text-align:center; padding: 40px; color: var(--texto-gris);'><i class='fas fa-folder-open fa-2x' style='color: #ccc; margin-bottom:15px;'></i><br>No hay comunicados registrados.</td></tr>";
                    return;
                }

                datos.forEach(c => {
                    const date = new Date(c.creado_en);
                    const formattedDate = date.toLocaleDateString('es-CR');

                    tbody.innerHTML += `
                <tr>
                    <td><b>${formattedDate}</b></td>
                    <td>
                        <strong style="color: ${c.color_borde};">${c.titulo}</strong>
                        <div style="font-size: 0.85rem; margin-top: 6px; color: var(--texto-gris);">
                            ${c.contenido}
                        </div>
                    </td>
                    <td>${c.autor}</td>
                    <td style="text-align: center; display: flex; gap: 8px; justify-content: center;">
                        <button class="btn-editar-com" onclick="editarComunicado(${c.id}, '${c.titulo.replace(/'/g, "\\'")}', '${c.contenido.replace(/'/g, "\\'").replace(/\n/g, "\\n")}', '${c.color_borde}')" title="Editar este comunicado">
                            <i class="fas fa-edit"></i> Editar
                        </button>
                        <button class="btn-eliminar-com" onclick="eliminarComunicado(${c.id})" title="Eliminar este comunicado">
                            <i class="fas fa-trash-alt"></i> Eliminar
                        </button>
                    </td>
                </tr>`;
                });
            } catch (e) {
                console.error(e);
                tbody.innerHTML = "<tr><td colspan='4'>Error al cargar los comunicados.</td></tr>";
            }
        }

        async function eliminarComunicado(id) {
            const confirmacion = await Swal.fire({
                title: '¿Eliminar comunicado?',
                html: '<span style="color:#555;font-size:0.95rem;">Esta acción <b>no se puede deshacer</b> y el comunicado desaparecerá para todos los usuarios.</span>',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#e74c3c',
                cancelButtonColor: '#6c757d',
                confirmButtonText: '<i class="fas fa-trash-alt"></i>&nbsp; Sí, eliminar',
                cancelButtonText: 'Cancelar',
                reverseButtons: true,
                customClass: { popup: 'swal-popup-modern' }
            });

            if (!confirmacion.isConfirmed) return;

            Swal.fire({
                title: 'Eliminando...',
                text: 'Por favor espere un momento',
                allowOutsideClick: false,
                showConfirmButton: false,
                customClass: { popup: 'swal-popup-modern' },
                didOpen: () => { Swal.showLoading(); }
            });

            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/comunicados?id=eq.${id}`, {
                    method: "DELETE",
                    headers
                });
                if (res.ok) {
                    Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Comunicado eliminado', showConfirmButton: false, timer: 2500, timerProgressBar: true, customClass: { popup: 'swal-toast-modern' } });
                    cargarComunicadosAdmin();
                } else {
                    Swal.fire({ icon: 'error', title: 'Error', text: 'No se pudo eliminar: ' + res.statusText, confirmButtonColor: '#0a4c23', customClass: { popup: 'swal-popup-modern' } });
                }
            } catch (e) {
                Swal.fire({ icon: 'error', title: 'Error de conexión', text: 'Problema de conexión.', confirmButtonColor: '#0a4c23', customClass: { popup: 'swal-popup-modern' } });
            }
        }

        async function editarComunicado(id, tituloActual, contenidoActual, colorActual) {
            const {
                value: formValues
            } = await Swal.fire({
                title: '<i class="fas fa-edit" style="margin-right:8px;font-size:1.1rem;"></i>Editar Comunicado',
                html: `
            <div style="padding: 0 2px;">
                <label class="swal-form-label">Título</label>
                <input id="swal-input-titulo" class="swal2-input" value="${tituloActual}" placeholder="Título del comunicado" style="margin: 0 0 4px; width: 100%;">
                <label class="swal-form-label">Contenido</label>
                <textarea id="swal-input-contenido" class="swal2-textarea" placeholder="Escriba el mensaje aquí..." rows="4" style="margin: 0 0 4px; width: 100%;">${contenidoActual}</textarea>
                <label class="swal-form-label">Tipo de comunicado</label>
                <select id="swal-input-color" class="swal2-select" style="width: 100%; margin: 0; padding: 10px 14px; cursor: pointer;">
                    <option value="#27ae60" ${colorActual === '#27ae60' ? 'selected' : ''}>🟢 Informativo (Verde)</option>
                    <option value="#3498db" ${colorActual === '#3498db' ? 'selected' : ''}>🔵 General (Azul)</option>
                    <option value="#f39c12" ${colorActual === '#f39c12' ? 'selected' : ''}>🟡 Importante (Naranja)</option>
                    <option value="#e74c3c" ${colorActual === '#e74c3c' ? 'selected' : ''}>🔴 Urgente (Rojo)</option>
                </select>
            </div>
        `,
                focusConfirm: false,
                showCancelButton: true,
                confirmButtonColor: '#0a4c23',
                cancelButtonColor: '#6c757d',
                confirmButtonText: 'Guardar cambios',
                cancelButtonText: 'Cancelar',
                customClass: { popup: 'swal-popup-edit' },
                didOpen: () => {
                    const actions = Swal.getActions();
                    if (actions) {
                        actions.style.cssText += 'display:flex!important;flex-direction:row!important;flex-wrap:nowrap!important;justify-content:center!important;gap:12px!important;';
                        const loader = actions.querySelector('.swal2-loader');
                        if (loader) loader.style.display = 'none';
                    }
                },
                preConfirm: () => {
                    const valTitulo = document.getElementById('swal-input-titulo').value.trim();
                    const valContenido = document.getElementById('swal-input-contenido').value.trim();
                    const valColor = document.getElementById('swal-input-color').value;

                    if (!valTitulo || !valContenido) {
                        Swal.showValidationMessage('El título y contenido son requeridos');
                    }
                    return {
                        titulo: valTitulo,
                        contenido: valContenido,
                        color_borde: valColor
                    };
                }
            });

            if (formValues) {
                Swal.fire({
                    title: 'Actualizando...',
                    text: 'Por favor espere',
                    allowOutsideClick: false,
                    showConfirmButton: false,
                    customClass: { popup: 'swal-popup-modern' },
                    didOpen: () => { Swal.showLoading(); }
                });

                try {
                    const res = await fetch(`${SUPABASE_URL}/rest/v1/comunicados?id=eq.${id}`, {
                        method: "PATCH",
                        headers,
                        body: JSON.stringify(formValues)
                    });

                    if (res.ok) {
                        Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Comunicado actualizado', showConfirmButton: false, timer: 2500, timerProgressBar: true, customClass: { popup: 'swal-toast-modern' } });
                        cargarComunicadosAdmin();
                    } else {
                        Swal.fire({ icon: 'error', title: 'Error', text: 'No se pudo actualizar el comunicado.', confirmButtonColor: '#0a4c23', customClass: { popup: 'swal-popup-modern' } });
                    }
                } catch (e) {
                    Swal.fire({ icon: 'error', title: 'Error de red', text: 'Problema de red al actualizar.', confirmButtonColor: '#0a4c23', customClass: { popup: 'swal-popup-modern' } });
                }
            }
        }

        function setupComunicadoListener() {
            const form = document.getElementById('formComunicado');
            if (form) {
                form.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    const btn = document.getElementById('btnPublicar');
                    btn.disabled = true;
                    const datos = {
                        titulo: document.getElementById('tituloCom').value,
                        contenido: document.getElementById('contenidoCom').value,
                        color_borde: document.getElementById('colorCom').value,
                        autor: localStorage.getItem('nombre')
                    };
                    try {
                        Swal.fire({
                            title: 'Publicando...',
                            text: 'Guardando el comunicado',
                            allowOutsideClick: false,
                            showConfirmButton: false,
                            customClass: { popup: 'swal-popup-modern' },
                            didOpen: () => { Swal.showLoading(); }
                        });
                        const res = await fetch(`${SUPABASE_URL}/rest/v1/comunicados`, {
                            method: "POST",
                            headers,
                            body: JSON.stringify(datos)
                        });
                        if (res.ok) {
                            Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Comunicado publicado', showConfirmButton: false, timer: 2500, timerProgressBar: true, customClass: { popup: 'swal-toast-modern' } });
                            this.reset();
                            cargarComunicadosAdmin(); // Reload the table automatically
                        } else {
                            const error = await res.json();
                            Swal.fire({ icon: 'error', title: 'Error al publicar', text: 'No se pudo publicar: ' + (error.message || res.statusText), confirmButtonColor: '#0a4c23', customClass: { popup: 'swal-popup-modern' } });
                        }
                    } catch (e) {
                        Swal.fire({ icon: 'error', title: 'Error', text: 'Error al publicar: ' + e.message, confirmButtonColor: '#0a4c23', customClass: { popup: 'swal-popup-modern' } });
                    }
                    btn.disabled = false;
                });
            }
        }

        async function cerrarSesion() {
            const confirmacion = await Swal.fire({
                title: '¿Cerrar Sesión?',
                text: '¿Seguro que desea salir del panel?',
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#0a4c23',
                cancelButtonColor: '#6c757d',
                confirmButtonText: '<i class="fas fa-sign-out-alt"></i>&nbsp; Sí, salir',
                cancelButtonText: 'Cancelar',
                reverseButtons: true,
                customClass: { popup: 'swal-popup-modern' }
            });

            if (confirmacion.isConfirmed) {
                localStorage.clear();
                globalThis.location.href = "index.html";
            }
        }

        window.onload = inicializar;

        // 🔎 FUNCIONALIDAD DE BUSQUEDA EN TABLA
        function filtrarTabla() {
            let input = document.getElementById("busquedaComunicados");
            let filter = input.value.toUpperCase();
            let table = document.getElementById("tablaComunicados");
            let tr = table.getElementsByTagName("tr");

            for (let i = 1; i < tr.length; i++) {
                let tds = tr[i].getElementsByTagName("td");
                let textDesde = tds.length > 0 ? (tds[0].textContent || tds[0].innerText) : "";
                let textMotivo = tds.length > 1 ? (tds[1].textContent || tds[1].innerText) : "";

                if (textMotivo.toUpperCase().indexOf(filter) > -1 || textDesde.toUpperCase().indexOf(filter) > -1) {
                    tr[i].style.display = "";
                } else {
                    tr[i].style.display = "none";
                }
            }
        }

        // ANIMACION DE OCULTAMIENTO EN CELULAR AL BAJAR
        let lastScrollY = window.scrollY;
        window.addEventListener('scroll', () => {
            if (window.innerWidth <= 600) {
                const btn = document.querySelector('.btn-cerrar');
                if (!btn) return;

                if (window.scrollY > lastScrollY && window.scrollY > 60) {
                    // Scroll hacia abajo: ocultar (animación de plegado)
                    btn.classList.add('hide-on-scroll');
                } else {
                    // Scroll hacia arriba o arriba del top: mostrar
                    btn.classList.remove('hide-on-scroll');
                }
            } else {
                // Restaurar si volviera mágicamente a desktop
                const btnX = document.querySelector('.btn-cerrar');
                if (btnX) btnX.classList.remove('hide-on-scroll');
            }
            lastScrollY = window.scrollY;
        });
    </script>
</body>

</html>
