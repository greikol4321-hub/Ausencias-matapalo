<script>
    // CONFIG EMAILJS
    try {
        emailjs.init({
            publicKey: "qAglmSdD5me55ae1-"
        });
    } catch (error) {
        console.error("Error configurando EmailJS:", error);
    }

    // 🔒 SESIÓN
    if (!localStorage.getItem('usuario') || !localStorage.getItem('nombre')) {
        window.location.href = "registrarme.html";
    }

    // ✅ CONFIG SUPABASE (CORREGIDO)
    const SUPABASE_URL = 'https://etdcmuikvtnqfcnlvodh.supabase.co';
    const SUPABASE_KEY = 'TU_API_KEY';

    const headers = {
        apikey: SUPABASE_KEY,
        Authorization: `Bearer ${SUPABASE_KEY}`,
        "Content-Type": "application/json"
    };

    function inicializar() {
        const nombre = localStorage.getItem('nombre');
        const rol = localStorage.getItem('rol');
        const usuario = localStorage.getItem('usuario');

        if (!nombre || !usuario) {
            window.location.href = "index.html";
            return;
        }

        if (rol !== 'admin') {
            window.location.href = "docentes.html";
            return;
        }

        document.getElementById('nombreUsuario').textContent = nombre;
        document.getElementById('usuario').textContent = usuario;
        document.getElementById('rol').textContent = rol;
        document.getElementById('rolBadge').textContent = rol;
        document.getElementById('rolBadge').style.background = '#e67e22';

        setupComunicadoListener();
        cargarComunicadosAdmin();
    }

    // ✅ CARGAR COMUNICADOS
    async function cargarComunicadosAdmin() {
        const tbody = document.getElementById('cuerpoTabla');

        try {
            console.log("Cargando comunicados...");

            const res = await fetch(`${SUPABASE_URL}/rest/v1/comunicados?select=*&order=creado_en.desc`, {
                headers
            });

            const datos = await res.json();
            console.log(datos);

            tbody.innerHTML = "";

            if (!datos || datos.length === 0) {
                tbody.innerHTML = "<tr><td colspan='4'>No hay comunicados.</td></tr>";
                return;
            }

            datos.forEach(c => {
                const date = new Date(c.creado_en);
                const formattedDate = date.toLocaleDateString('es-CR');

                tbody.innerHTML += `
                <tr>
                    <td><b>${formattedDate}</b></td>
                    <td>
                        <strong style="color:${c.color_borde};">${c.titulo}</strong>
                        <div style="font-size: 0.85rem;">${c.contenido}</div>
                    </td>
                    <td>${c.autor}</td>
                    <td>
                        <button onclick="eliminarComunicado(${c.id})">Eliminar</button>
                    </td>
                </tr>`;
            });

        } catch (e) {
            console.error("ERROR:", e);
            tbody.innerHTML = "<tr><td colspan='4'>Error al cargar</td></tr>";
        }
    }

    async function eliminarComunicado(id) {
        try {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/comunicados?id=eq.${id}`, {
                method: "DELETE",
                headers
            });

            if (res.ok) {
                cargarComunicadosAdmin();
            } else {
                alert("Error al eliminar");
            }

        } catch (e) {
            console.error(e);
        }
    }

    function setupComunicadoListener() {
        const form = document.getElementById('formComunicado');

        if (form) {
            form.addEventListener('submit', async function(e) {
                e.preventDefault();

                const datos = {
                    titulo: document.getElementById('tituloCom').value,
                    contenido: document.getElementById('contenidoCom').value,
                    color_borde: document.getElementById('colorCom').value,
                    autor: localStorage.getItem('nombre')
                };

                try {
                    const res = await fetch(`${SUPABASE_URL}/rest/v1/comunicados`, {
                        method: "POST",
                        headers,
                        body: JSON.stringify(datos)
                    });

                    if (res.ok) {
                        this.reset();
                        cargarComunicadosAdmin();
                    } else {
                        alert("Error al guardar");
                    }

                } catch (e) {
                    console.error(e);
                }
            });
        }
    }

    function cerrarSesion() {
        localStorage.clear();
        window.location.href = "index.html";
    }

    // ✅ BUSCADOR CORREGIDO
    function filtrarTabla() {
        let input = document.getElementById("busquedaComunicados");
        let filter = input.value.toUpperCase();
        let table = document.getElementById("tablaComunicados");
        let tr = table.getElementsByTagName("tr");

        for (let i = 1; i < tr.length; i++) {
            let textDesde = tr[i].getElementsByTagName("td")[0]?.innerText || "";
            let textMotivo = tr[i].getElementsByTagName("td")[1]?.innerText || "";

            if (
                textMotivo.toUpperCase().includes(filter) ||
                textDesde.toUpperCase().includes(filter)
            ) {
                tr[i].style.display = "";
            } else {
                tr[i].style.display = "none";
            }
        }
    }

    window.onload = inicializar;
</script>
