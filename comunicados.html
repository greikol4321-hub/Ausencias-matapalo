<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de Comunicados</title>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f4f6f9;
}

.container {
    width: 90%;
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

h2 {
    text-align: center;
}

form {
    background: white;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
}

input, textarea, select {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}

button {
    margin-top: 10px;
    padding: 10px;
    cursor: pointer;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}

th, td {
    padding: 10px;
    border: 1px solid #ddd;
}

th {
    background: #2c3e50;
    color: white;
}
</style>
</head>

<body>

<div class="container">

<h2>Gestión de Comunicados</h2>

<!-- FORMULARIO -->
<form id="formComunicado">
    <input type="text" id="tituloCom" placeholder="Título" required>
    <textarea id="contenidoCom" placeholder="Contenido" required></textarea>

    <select id="colorCom">
        <option value="#27ae60">Verde</option>
        <option value="#3498db">Azul</option>
        <option value="#f39c12">Naranja</option>
        <option value="#e74c3c">Rojo</option>
    </select>

    <button type="submit">Guardar</button>
</form>

<!-- BUSCADOR -->
<input type="text" id="busquedaComunicados" placeholder="Buscar..." onkeyup="filtrarTabla()">

<!-- TABLA -->
<table id="tablaComunicados">
    <thead>
        <tr>
            <th>Fecha</th>
            <th>Contenido</th>
            <th>Autor</th>
            <th>Acción</th>
        </tr>
    </thead>
    <tbody id="cuerpoTabla">
        <tr><td colspan="4">Cargando...</td></tr>
    </tbody>
</table>

</div>

<script>

// 🔹 CONFIG SUPABASE
const SUPABASE_URL = 'https://etdcmuikvtnqfcnlvodh.supabase.co';
const SUPABASE_KEY = 'TU_API_KEY_AQUI';

const headers = {
    apikey: SUPABASE_KEY,
    Authorization: `Bearer ${SUPABASE_KEY}`,
    "Content-Type": "application/json"
};

// 🔹 CARGAR DATOS
async function cargarComunicados() {
    const tbody = document.getElementById('cuerpoTabla');

    try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/comunicados?select=*`, { headers });

        const datos = await res.json();
        console.log(datos);

        tbody.innerHTML = "";

        if (!datos.length) {
            tbody.innerHTML = "<tr><td colspan='4'>Sin datos</td></tr>";
            return;
        }

        datos.forEach(c => {
            const fecha = c.creado_en ? new Date(c.creado_en).toLocaleDateString() : "";

            tbody.innerHTML += `
            <tr>
                <td>${fecha}</td>
                <td>
                    <strong style="color:${c.color_borde}">${c.titulo}</strong><br>
                    ${c.contenido}
                </td>
                <td>${c.autor}</td>
                <td>
                    <button onclick="eliminar(${c.id})">Eliminar</button>
                </td>
            </tr>`;
        });

    } catch (e) {
        console.error(e);
        tbody.innerHTML = "<tr><td colspan='4'>Error</td></tr>";
    }
}

// 🔹 GUARDAR
document.getElementById('formComunicado').addEventListener('submit', async function(e){
    e.preventDefault();

    const datos = {
        titulo: tituloCom.value,
        contenido: contenidoCom.value,
        color_borde: colorCom.value,
        autor: "Admin"
    };

    const res = await fetch(`${SUPABASE_URL}/rest/v1/comunicados`, {
        method: "POST",
        headers,
        body: JSON.stringify(datos)
    });

    if(res.ok){
        this.reset();
        cargarComunicados();
    } else {
        alert("Error al guardar");
    }
});

// 🔹 ELIMINAR
async function eliminar(id){
    await fetch(`${SUPABASE_URL}/rest/v1/comunicados?id=eq.${id}`, {
        method:"DELETE",
        headers
    });
    cargarComunicados();
}

// 🔹 BUSCAR
function filtrarTabla() {
    let input = document.getElementById("busquedaComunicados").value.toUpperCase();
    let tr = document.getElementById("tablaComunicados").getElementsByTagName("tr");

    for (let i = 1; i < tr.length; i++) {
        let tds = tr[i].getElementsByTagName("td");
        let texto = (tds[0]?.innerText || "") + (tds[1]?.innerText || "");

        tr[i].style.display = texto.toUpperCase().includes(input) ? "" : "none";
    }
}

// 🔹 INICIAR
cargarComunicados();

</script>

</body>
</html>
