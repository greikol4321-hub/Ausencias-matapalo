<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería STEAM - CTP Matapalo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="stylo.css">
    <style>
        /* ESTILOS ESPECÍFICOS PARA GALERIA.HTML */
        .galeria-container {
            padding: 40px 20px;
        }

        .galeria-container h1 {
            text-align: center;
            color: var(--texto-titulo);
            font-size: 2rem;
            margin-bottom: 30px;
        }

        .galeria {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .item {
            background: var(--blanco);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            border: 2px solid var(--verde-base);
        }

        .item:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(10, 76, 35, 0.2);
        }

        .item img,
        .item video {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        @media (max-width: 600px) {
            .galeria {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

<header class="header">
    <div class="header-container">
        <div class="header-logos-left">
            <img src="LOGO_MEP-removebg-preview.png" class="logo-mep" alt="MEP Costa Rica">
            <div class="divider"></div>
            <div class="logo-gobierno">
                <strong>Gobierno</strong><br>
                de Costa Rica
            </div>
        </div>
        
        <div class="nav-right">
            <img src="escudo sin fondo.png" class="logo-escudo" alt="Escudo CTP Matapalo">
            <a href="index.html" class="btn-login">Volver al Inicio</a>
        </div>
    </div>
</header>

<div class="galeria-container">
    <h1><i class="fas fa-images"></i> Galería STEAM</h1>

    <div class="galeria">
        <div class="item"><img src="1.jpeg" alt="Imagen 1"></div>
        <div class="item"><img src="2.jpeg" alt="Imagen 2"></div>
        <div class="item"><img src="3.jpeg" alt="Imagen 3"></div>
        <div class="item"><img src="4.jpeg" alt="Imagen 4"></div>
        <div class="item"><img src="5.jpeg" alt="Imagen 5"></div>
    </div>
</div>

</body>

</html>
