<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería STEAM - CTP Matapalo</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #0a2412 0%, #0f3320 100%);
            min-height: 100vh;
            color: #e0e0e0;
            padding: 20px;
        }

        .header {
            padding: 30px 0;
            margin-bottom: 20px;
            border-bottom: 2px solid #2d8659;
        }

        .header img {
            height: 80px;
            margin: 0 10px;
            transition: transform 0.3s;
        }

        .header img:hover {
            transform: scale(1.05);
        }

        h1 {
            margin: 20px 0;
            color: #a8d5ba;
            font-size: 2rem;
        }

        /* GALERÍA */
        .galeria {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* TARJETAS */
        .item {
            background: #1a4d2e;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
            transition: transform 0.3s, box-shadow 0.3s;
            border: 2px solid #2d8659;
        }

        .item:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 20px rgba(45, 134, 89, 0.4);
        }

        /* IMÁGENES Y VIDEOS */
        .item img,
        .item video {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        /* RESPONSIVE */
        @media (max-width: 600px) {
            h1 {
                font-size: 1.5rem;
            }

            .galeria {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 15px;
            }

            .item img,
            .item video {
                height: 150px;
            }
        }
    </style>
</head>

<body>

    <div class="header">
        <img src="steam.png" alt="STEAM">
        <img src="escudo sin fondo.png" alt="Escudo CTP" style="max-width: 100px; height: auto;">
    </div>

    <h1>🖼️ Galería STEAM</h1>

    <div class="galeria">

        <!-- IMÁGENES -->
        <div class="item">
            <img src="1.jpeg" alt="Imagen 1">
        </div>

        <div class="item">
            <img src="2.jpeg" alt="Imagen 2">
        </div>

        <div class="item">
            <img src="3.jpeg" alt="Imagen 3">
        </div>

        <div class="item">
            <img src="4.jpeg" alt="Imagen 4">
        </div>

        <div class="item">
            <img src="5.jpeg" alt="Imagen 5">
        </div>

    </div>

</body>

</html>
