<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Docentes - CTP Matapalo</title>
    <link rel="stylesheet" href="stylo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ESTILOS ESPECÍFICOS PARA REGISTRO-DOCENTES.HTML */
        .form-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 120px);
            padding: 40px 20px;
        }
        .form-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 30px;
            background: var(--crema);
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--borde);
        }

        .form-container h1 {
            text-align: center;
            color: var(--texto-titulo);
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .mensaje {
            padding: 15px;
            border-radius: 6px;
            margin-top: 15px;
            display: none;
            font-weight: bold;
            text-align: center;
        }

        .éxito {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid var(--verde-base);
        }

        .error {
            background: #ffebee;
            color: #c62828;
            border: 1px solid var(--rojo);
        }

        .mensaje.show {
            display: block;
        }

        a.btn-volver {
            display: block;
            text-align: center;
            margin-top: 15px;
            padding: 12px;
            background: var(--texto-gris);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: 0.3s;
        }

        a.btn-volver:hover {
            background: #444;
        }
    </style>
</head>

<body>

<header class="header">
    <div class="header-container">
        <div class="header-logos-left">
            <img src="LOGO_MEP-removebg-preview.png" class="logo-mep" alt="MEP Costa Rica">
            <div class="divider"></div>
            <div class="logo-gobierno">
                <strong>Gobierno</strong><br>
                de Costa Rica
            </div>
        </div>
        
        <div class="nav-right">
            <img src="escudo sin fondo.png" class="logo-escudo" alt="Escudo CTP Matapalo">
            <a href="index.html" class="btn-login">Volver al Inicio</a>
        </div>
    </div>
</header>

<div class="form-page">
    <div class="form-container">
        <h1><i class="fas fa-user-check"></i> Registro de Docentes</h1>

        <form id="miFormulario">
            <div class="form-group">
                <label for="nombre"><i class="fas fa-user"></i> Nombre Completo:</label>
                <input type="text" id="nombre" name="nombre" required placeholder="Tu nombre completo">
            </div>

            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Correo Institucional:</label>
                <input type="email" id="email" name="email" required placeholder="correo@mep.go.cr">
            </div>

            <div class="form-group">
                <label for="password"><i class="fas fa-key"></i> Contraseña:</label>
                <input type="password" id="password" name="password" required placeholder="Crea una contraseña segura">
            </div>

            <div class="form-group">
                <label for="materia"><i class="fas fa-book"></i> Materia/Especialidad:</label>
                <textarea id="materia" name="materia" rows="2" placeholder="Describe tu materia o especialidad..."></textarea>
            </div>

            <button type="submit"><i class="fas fa-check"></i> REGISTRARSE</button>
        </form>

        <div class="mensaje" id="mensaje"></div>
    </div>
</div>

    <script>
        // Configuración de Supabase
        const SUPABASE_URL = 'https://etdcmuikvtnqfcnlvodh.supabase.co';
        const SUPABASE_KEY = 'TU_API_KEY_AQUI';

        const form = document.getElementById('miFormulario');
        const mensajeDiv = document.getElementById('mensaje');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const nombre = document.getElementById('nombre').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const materia = document.getElementById('materia').value;

            /* 🔥 VALIDACIÓN CORREO MEP */
            if (!email.endsWith("@mep.go.cr")) {
                mensajeDiv.textContent = '❌ Solo se permiten correos institucionales (@mep.go.cr)';
                mensajeDiv.className = 'mensaje error show';
                return;
            }

            try {
                const response = await fetch(
                    `${SUPABASE_URL}/rest/v1/todos`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${SUPABASE_KEY}`
                        },
                        body: JSON.stringify({
                            title: nombre,
                            materia: materia,
                            user_email: email,
                            password: password
                        })
                    }
                );

                if (response.ok) {
                    mensajeDiv.textContent = '✅ ¡Datos guardados correctamente!';
                    mensajeDiv.className = 'mensaje éxito show';
                    form.reset();

                    setTimeout(() => {
                        mensajeDiv.classList.remove('show');
                    }, 3000);
                } else {
                    const errorData = await response.json().catch(() => ({}));
                    const errorMsg = errorData.message || errorData.error || `Error ${response.status}`;
                    throw new Error(errorMsg);
                }

            } catch (error) {
                mensajeDiv.textContent = '❌ Error: ' + error.message;
                mensajeDiv.className = 'mensaje error show';
                console.error(error);
            }
        });
    </script>

</body>
</html>
