<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login - CTP Matapalo</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="stylo.css">
<style>
    /* ESTILOS ESPECÍFICOS PARA REGISTRARME.HTML */
    .login-page {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: calc(100vh - 120px); /* Ajustar para la altura del header */
        padding: 40px 20px;
    }

    .login-container {
        background: white;
        border-radius: 12px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        padding: 40px;
        width: 100%;
        max-width: 420px;
    }

    .login-header {
        text-align: center;
        margin-bottom: 30px;
    }

    .login-header h1 {
        font-size: 28px;
        font-weight: 700;
        color: var(--texto-titulo);
        margin-bottom: 8px;
    }

    .login-header p {
        font-size: 14px;
        color: var(--texto-gris);
    }

    .form-group {
        margin-bottom: 20px;
        position: relative;
    }

    .form-group i {
        position: absolute;
        left: 14px;
        top: 14px;
        color: var(--verde-base);
        font-size: 18px;
    }

    input {
        padding-left: 45px;
    }

    .btn-container {
        margin-top: 30px;
    }

    .mensaje {
        margin-top: 15px;
        padding: 12px 15px;
        display: none;
        border-radius: 8px;
        text-align: center;
        font-weight: 500;
    }

    .exito {
        background: #e8f5e9;
        color: #2e7d32;
        border: 1px solid var(--verde-base);
    }

    .error {
        background: #ffebee;
        color: #c62828;
        border: 1px solid var(--rojo);
    }

    .show {
        display: block;
    }
</style>
</head>

<body>

<header class="header">
    <div class="header-container">
        <div class="header-logos-left">
            <img src="LOGO_MEP-removebg-preview.png" class="logo-mep" alt="MEP Costa Rica">
            <div class="divider"></div>
            <div class="logo-gobierno">
                <strong>Gobierno</strong><br>
                de Costa Rica
            </div>
        </div>
        
        <div class="nav-right">
            <img src="escudo sin fondo.png" class="logo-escudo" alt="Escudo CTP Matapalo">
            <a href="index.html" class="btn-login">Volver al Inicio</a>
        </div>
    </div>
</header>

<div class="login-page">
    <div class="login-container">
        <div class="login-header">
            <h1>Acceso al Panel</h1>
            <p>Usa tus credenciales para ingresar al sistema.</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <i class="fas fa-user"></i>
                <input type="text" id="usuario" placeholder="Usuario" required>
            </div>

            <div class="form-group">
                <i class="fas fa-key"></i>
                <input type="password" id="password" placeholder="Contraseña" required>
            </div>

            <div class="btn-container">
                <button type="submit"><i class="fas fa-sign-in-alt"></i> INGRESAR</button>
            </div>
        </form>

        <div id="mensaje" class="mensaje"></div>
    </div>
</div>

<script>

const SUPABASE_URL = 'https://iowxlwnosyyqetbvvmuk.supabase.co';

const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlvd3hsd25vc3l5cWV0YnZ2bXVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTk4NDYsImV4cCI6MjA5MTc3NTg0Nn0.VZ5VMu0z4nlsZ0hKvDSk4IUluA1yGx9eQCCXzDc5HmU';

const form = document.getElementById('loginForm');
const mensaje = document.getElementById('mensaje');

form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const usuario = document.getElementById('usuario').value;
    const password = document.getElementById('password').value;

    try {

        const response = await fetch(
            `${SUPABASE_URL}/rest/v1/usuarios?usuario=eq.${encodeURIComponent(usuario)}&contrasena=eq.${encodeURIComponent(password)}`,
            {
                method: 'GET',
                headers: {
                    apikey: SUPABASE_KEY,
                    Authorization: `Bearer ${SUPABASE_KEY}`
                }
            }
        );

        const data = await response.json();

        if (data.length > 0) {

            const user = data[0];

            // 🔐 GUARDAR SESIÓN
            localStorage.setItem("usuario", user.usuario);
            localStorage.setItem("nombre", user.nombre_completo);
            localStorage.setItem("rol", user.rol);

            mensaje.textContent = "✅ Bienvenido " + user.nombre_completo;
            mensaje.className = "mensaje exito show";

            setTimeout(() => {
                window.location.href = "docentes.html";
            }, 1500);

        } else {
            mensaje.textContent = "❌ Usuario o contraseña incorrectos";
            mensaje.className = "mensaje error show";
        }

    } catch (error) {
        mensaje.textContent = "❌ Error de conexión";
        mensaje.className = "mensaje error show";
        console.error(error);
    }
});

</script>

</body>
</html>
