<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Colegio</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* HEADER AZUL */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #0a3d62;
            padding: 10px 20px;
            color: white;
        }

        /* CENTRO */
        .center {
            text-align: center;
            width: 60%;
        }

        .center img {
            width: 100px;
        }

        .center h1 {
            margin: 5px 0 0 0;
            font-size: 22px;
        }

        /* BOTONES */
        .right {
            width: 20%;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .btn {
            padding: 8px 12px;
            text-decoration: none;
            color: white;
            border-radius: 5px;
            font-size: 14px;
        }

        .btn-registro {
            background-color: #38ada9;
        }

        .btn-login {
            background-color: #e58e26;
        }

        .btn:hover {
            opacity: 0.8;
        }

        /* SECCIÓN BLANCA */
        .seccion-blanca {
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            gap: 30px;
            padding: 20px;
            background-color: white;
        }

        /* LOGO STEAM */
        .steam {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .steam img {
            width: 80px;
        }

        /* ANUNCIOS */
        .anuncios {
            margin-top: 10px;
            width: 200px;
            height: 100px;
            background-color: #dcdde1;
            color: #333;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="header">

        <div style="width:20%;"></div>

        <div class="center">
            <img src="escudo sin fondo.png" alt="Escudo Colegio">
            <h1>Colegio Técnico Profesional de Matapalo</h1>
        </div>

        <div class="right">
            <a href="registro-docentes.html" class="btn btn-registro">Registro Docente</a>
            <a href="registrarme.html" class="btn btn-login">Iniciar Sesión</a>
        </div>

    </div>

    <!-- SECCIÓN BLANCA -->
    <div class="seccion-blanca">

        <div class="steam">
            <img src="steam.png" alt="Logo STEAM">
            <div class="anuncios">
                Espacio para anuncios del colegio
            </div>
        </div>

    </div>

</body>
</html>
