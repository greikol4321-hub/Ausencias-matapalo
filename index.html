<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Colegio</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* HEADER */
.header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background-color: #0a3d62;
    padding: 10px 20px;
    color: white;
}

.center {
    text-align: center;
    width: 60%;
}

.center img {
    width: 100px;
}

.right {
    display: flex;
    gap: 10px;
}

.btn {
    padding: 8px 12px;
    text-decoration: none;
    color: white;
    border-radius: 5px;
}

.btn-registro { background-color: #38ada9; }
.btn-login { background-color: #e58e26; }

/* SECCIÓN */
.seccion-blanca {
    padding: 20px;
}

/* CONTENEDOR */
.contenedor {
    display: flex;
    gap: 40px;
    align-items: flex-start;
}

/* LOGO */
.steam img {
    width: 100px;
}

/* CARRUSEL GRANDE */
.carousel-container {
    flex: 1; /* ocupa más espacio */
    text-align: center;
}

.carousel {
    position: relative;
    width: 100%;
    height: 300px; /* MÁS GRANDE */
    overflow: hidden;
    border-radius: 10px;
}

/* IMÁGENES ADAPTABLES */
.slides img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover; /* se adapta sin deformarse */
    opacity: 0;
    transition: opacity 0.8s ease-in-out;
}

.slides img.active {
    opacity: 1;
}

/* BOTONES */
.prev, .next {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background-color: rgba(0,0,0,0.5);
    color: white;
    border: none;
    padding: 8px 12px;
    cursor: pointer;
}

/* PUNTITOS */
.dots {
    margin-top: 10px;
}

.dot {
    height: 12px;
    width: 12px;
    margin: 0 5px;
    background-color: #bbb;
    border-radius: 50%;
    display: inline-block;
    cursor: pointer;
}

.dot.active {
    background-color: #333;
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .contenedor {
        flex-direction: column;
        align-items: center;
    }

    .carousel {
        height: 200px;
    }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div></div>

    <div class="center">
        <img src="escudo sin fondo.png">
        <h1>Colegio Técnico Profesional de Matapalo</h1>
    </div>

    <div class="right">
        <a href="registro-docentes.html" class="btn btn-registro">Registro Docente</a>
        <a href="registrarme.html" class="btn btn-login">Iniciar Sesión</a>
    </div>
</div>

<!-- SECCIÓN -->
<div class="seccion-blanca">

    <div class="contenedor">

        <!-- LOGO -->
        <div class="steam">
            <img src="steam.png">
            
        </div>

        <!-- CARRUSEL ÚNICO -->
        <div class="carousel-container">
            <h2>Anuncios del Colegio</h2>

            <div class="carousel" id="carousel1">
                <div class="slides">
                    <img src="1.jpeg" class="active">
                    <img src="2.jpeg">
                    <img src="3.jpeg">
                    <img src="4.jpeg">
                    <img src="5.jpeg">
                      <img src="2.jpeg">
                    <img src="3.jpeg">
                    <img src="4.jpeg">
                    <img src="5.jpeg">
                </div>

                <button class="prev" onclick="cambiar(-1)">❮</button>
                <button class="next" onclick="cambiar(1)">❯</button>
            </div>

            <div class="dots">
                <span class="dot active" onclick="irA(0)"></span>
                <span class="dot" onclick="irA(1)"></span>
                <span class="dot" onclick="irA(2)"></span>
                <span class="dot" onclick="irA(3)"></span>
                <span class="dot" onclick="irA(4)"></span>
            </div>
        </div>

    </div>

</div>

<script>
let index = 0;
let slides = document.querySelectorAll("#carousel1 .slides img");
let dots = document.querySelectorAll(".dot");

/* MOSTRAR */
function mostrar(i) {
    slides.forEach(img => img.classList.remove("active"));
    dots.forEach(dot => dot.classList.remove("active"));

    slides[i].classList.add("active");
    dots[i].classList.add("active");
}

/* CAMBIAR */
function cambiar(direccion) {
    index += direccion;

    if (index < 0) index = slides.length - 1;
    if (index >= slides.length) index = 0;

    mostrar(index);
}

/* IR A */
function irA(i) {
    index = i;
    mostrar(index);
}

/* AUTO + PAUSA */
let intervalo = setInterval(() => cambiar(1), 4000);

let carrusel = document.getElementById("carousel1");

carrusel.addEventListener("mouseenter", () => {
    clearInterval(intervalo);
});

carrusel.addEventListener("mouseleave", () => {
    intervalo = setInterval(() => cambiar(1), 4000);
});
</script>

</body>
</html>
