<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Colegio</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* HEADER */
.header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background-color: #0a3d62;
    padding: 10px 20px;
    color: white;
}

.center {
    text-align: center;
    width: 60%;
}

.center img {
    width: 100px;
}

.right {
    display: flex;
    gap: 10px;
}

.btn {
    padding: 8px 12px;
    text-decoration: none;
    color: white;
    border-radius: 5px;
}

.btn-registro { background-color: #38ada9; }
.btn-login { background-color: #e58e26; }

/* SECCIÓN */
.seccion-blanca {
    padding: 20px;
}

/* CONTENEDOR */
.contenedor {
    display: flex;
    gap: 40px;
    align-items: flex-start;
}

/* LOGO */
.steam img {
    width: 100px;
}

/* CARRUSEL */
.carousel-container {
    text-align: center;
}

.carousel {
    position: relative;
    width: 250px;
    height: 150px;
    overflow: hidden;
    border-radius: 10px;
}

/* FADE */
.slides img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 0.8s ease-in-out;
}

.slides img.active {
    opacity: 1;
}

/* BOTONES */
.prev, .next {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background-color: rgba(0,0,0,0.5);
    color: white;
    border: none;
    padding: 6px 10px;
    cursor: pointer;
}

.prev { left: 5px; }
.next { right: 5px; }

/* PUNTITOS */
.dots {
    margin-top: 8px;
}

.dot {
    height: 10px;
    width: 10px;
    margin: 0 4px;
    background-color: #bbb;
    border-radius: 50%;
    display: inline-block;
    cursor: pointer;
}

.dot.active {
    background-color: #333;
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .contenedor {
        flex-direction: column;
        align-items: center;
    }

    .center {
        width: 100%;
    }

    .carousel {
        width: 90%;
    }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div></div>

    <div class="center">
        <img src="escudo sin fondo.png">
        <h1>Colegio Técnico Profesional de Matapalo</h1>
    </div>

    <div class="right">
        <a href="registro-docentes.html" class="btn btn-registro">Registro Docente</a>
        <a href="registrarme.html" class="btn btn-login">Iniciar Sesión</a>
    </div>
</div>

<!-- SECCIÓN -->
<div class="seccion-blanca">

    <div class="contenedor">

        <!-- LOGO -->
        <div class="steam">
            <img src="steam.png">
        </div>

        <!-- CARRUSEL 1 -->
        <div class="carousel-container">
            <h3>Anuncios</h3>

            <div class="carousel" id="carousel1">
                <div class="slides">
                    <img src="1.jpeg" class="active">
                    <img src="2.jpeg">
                    <img src="3.jpeg">
                    <img src="4.jpeg">
                    <img src="5.jpeg">
                </div>

                <button class="prev" onclick="cambiar(1,-1)">❮</button>
                <button class="next" onclick="cambiar(1,1)">❯</button>
            </div>

            <div class="dots">
                <span class="dot active" onclick="irA(1,0)"></span>
                <span class="dot" onclick="irA(1,1)"></span>
                <span class="dot" onclick="irA(1,2)"></span>
                <span class="dot" onclick="irA(1,3)"></span>
                <span class="dot" onclick="irA(1,4)"></span>
            </div>
        </div>

        <!-- CARRUSEL 2 -->
        <div class="carousel-container">
            <h3>Anuncios Mensuales</h3>

            <div class="carousel" id="carousel2">
                <div class="slides">
                    <img src="1.jpg" class="active">
                    <img src="2.jpg">
                    <img src="3.jpg">
                    <img src="4.jpg">
                    <img src="5.jpg">
                </div>

                <button class="prev" onclick="cambiar(2,-1)">❮</button>
                <button class="next" onclick="cambiar(2,1)">❯</button>
            </div>

            <div class="dots">
                <span class="dot active" onclick="irA(2,0)"></span>
                <span class="dot" onclick="irA(2,1)"></span>
                <span class="dot" onclick="irA(2,2)"></span>
                <span class="dot" onclick="irA(2,3)"></span>
                <span class="dot" onclick="irA(2,4)"></span>
            </div>
        </div>

    </div>

</div>

<script>
let indices = [0, 0];
let intervalos = [];

/* MOSTRAR */
function mostrar(carrusel) {
    let slides = document.querySelectorAll("#carousel" + carrusel + " .slides img");
    let dots = document.querySelectorAll("#carousel" + carrusel + " ~ .dots .dot");

    slides.forEach(img => img.classList.remove("active"));
    dots.forEach(dot => dot.classList.remove("active"));

    slides[indices[carrusel - 1]].classList.add("active");
    dots[indices[carrusel - 1]].classList.add("active");
}

/* CAMBIAR */
function cambiar(carrusel, direccion) {
    let slides = document.querySelectorAll("#carousel" + carrusel + " .slides img");

    indices[carrusel - 1] += direccion;

    if (indices[carrusel - 1] < 0) indices[carrusel - 1] = slides.length - 1;
    if (indices[carrusel - 1] >= slides.length) indices[carrusel - 1] = 0;

    mostrar(carrusel);
}

/* IR A */
function irA(carrusel, i) {
    indices[carrusel - 1] = i;
    mostrar(carrusel);
}

/* AUTO + PAUSA */
function iniciarAuto(carrusel, tiempo) {
    let contenedor = document.getElementById("carousel" + carrusel);

    intervalos[carrusel] = setInterval(() => {
        cambiar(carrusel, 1);
    }, tiempo);

    contenedor.addEventListener("mouseenter", () => {
        clearInterval(intervalos[carrusel]);
    });

    contenedor.addEventListener("mouseleave", () => {
        intervalos[carrusel] = setInterval(() => {
            cambiar(carrusel, 1);
        }, tiempo);
    });
}

/* ACTIVAR */
iniciarAuto(1, 4000);
iniciarAuto(2, 5000);
</script>

</body>
</html>
