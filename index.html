<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTP de Matapalo - Sitio Oficial</title>

    <style>
        :root {
            /* PALETA INSTITUCIONAL OPTIMIZADA */
            --verde-base: #1b5e20;        /* Verde Oscuro Principal */
            --verde-suave: #e8f5e9;       /* Para fondos de badges */
            --fondo-sitio: #f4f7f5;       /* Gris muy claro (reemplaza al negro) */
            --blanco: #ffffff;
            --texto-titulo: #1b5e20;
            --texto-cuerpo: #333333;
            --texto-gris: #666666;
            --borde: #d1d9d1;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--fondo-sitio);
            color: var(--texto-cuerpo);
            line-height: 1.6;
        }

        /* HEADER VERDE OSCURO */
        .header {
            background-color: var(--verde-base);
            padding: 40px 20px;
            color: white;
            text-align: center;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .header-logos {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            margin-bottom: 20px;
        }

        /* LOGO MEP: Forzado a blanco puro para que resalte sobre el verde oscuro */
        .logo-mep { 
            height: 60px; 
            filter: brightness(0) invert(1); 
        } 

        .logo-escudo { 
            height: 95px; 
        }

        .header h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* BOTÓN ACCESO PERSONAL */
        .nav-actions {
            position: absolute;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
        }

        .btn-login {
            padding: 10px 22px;
            border-radius: 5px;
            background-color: transparent;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            border: 2px solid rgba(255,255,255,0.8);
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            background-color: white;
            color: var(--verde-base);
        }

        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* DISEÑO DE TARJETAS SUPERIORES */
        .grid-superior {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 25px;
            margin-bottom: 50px;
        }

        .card-steam {
            background: var(--blanco);
            padding: 30px 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--borde);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .card-steam img { width: 120px; margin-bottom: 15px; }
        .card-steam h3 { color: var(--verde-base); margin-top: 0; }

        .carousel-box {
            background: var(--blanco);
            padding: 8px;
            border-radius: 12px;
            border: 1px solid var(--borde);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .carousel {
            overflow: hidden;
            border-radius: 8px;
            height: 380px;
        }

        .slides { display: flex; transition: transform 0.8s ease; height: 100%; }
        .slides img { width: 100%; min-width: 100%; object-fit: cover; }

        /* SECCIONES */
        .titulo-seccion {
            font-size: 1.5rem;
            margin-bottom: 25px;
            color: var(--verde-base);
            border-left: 5px solid var(--verde-base);
            padding-left: 15px;
        }

        /* COMUNICADOS */
        .comunicados-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .comunicado-card {
            background: var(--blanco);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid var(--borde);
            position: relative;
        }

        .comunicado-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: var(--verde-base);
            border-radius: 10px 10px 0 0;
        }

        .comunicado-card .meta { font-size: 0.7rem; color: var(--texto-gris); font-weight: bold; }
        .comunicado-card h3 { margin: 10px 0; font-size: 1.1rem; color: var(--verde-base); }
        .comunicado-card p { font-size: 0.9rem; color: var(--texto-cuerpo); }

        /* TABLA DE ASISTENCIA */
        .tabla-container {
            background: var(--blanco);
            border-radius: 10px;
            border: 1px solid var(--borde);
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; }
        
        th { 
            text-align: left; 
            padding: 15px; 
            background: var(--verde-base); 
            color: white; 
            font-size: 0.8rem; 
            text-transform: uppercase;
        }
        
        tbody td { padding: 15px; border-bottom: 1px solid #eee; }
        tbody tr:nth-child(even) { background-color: #f9fbf9; }
        tbody tr:hover { background-color: #f1f1f1; }

        .badge-motivo {
            background: var(--verde-suave);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--verde-base);
        }

        @media (max-width: 900px) {
            .grid-superior { grid-template-columns: 1fr; }
            .nav-actions { position: static; transform: none; margin-top: 20px; text-align: center; }
            .header h1 { font-size: 1.5rem; }
        }
    </style>
</head>

<body>

    <header class="header">
        <div class="header-logos">
            <img src="LOGO MEP.png" class="logo-mep" alt="MEP">
            <img src="escudo sin fondo.png" class="logo-escudo" alt="CTP Matapalo">
        </div>
        <h1>Colegio Técnico Profesional de Matapalo</h1>
        <div class="nav-actions">
            <a href="registrarme.html" class="btn-login">Acceso Personal</a>
        </div>
    </header>

    <main class="container">
        <div class="grid-superior">
            <section class="card-steam">
                <a href="galeria.html"><img src="steam.png" alt="STEAM"></a>
                <h3>Modelo STEAM</h3>
                <p>Innovación educativa en Ciencia y Tecnología.</p>
            </section>

            <section class="carousel-box">
                <div class="carousel">
                    <div class="slides" id="slides">
                        <img src="1.jpeg"> <img src="2.jpeg"> <img src="3.jpeg"> <img src="4.jpeg"> <img src="5.jpeg">
                    </div>
                </div>
            </section>
        </div>

        <section>
            <h2 class="titulo-seccion">Comunicados Oficiales</h2>
            <div class="comunicados-grid" id="contenedorComunicados">
                <p style="text-align: center; grid-column: 1/-1;">Cargando anuncios oficiales...</p>
            </div>
        </section>

        <section>
            <h2 class="titulo-seccion">Reporte de Asistencia Docente</h2>
            <div class="tabla-container">
                <table>
                    <thead>
                        <tr>
                            <th>Docente</th>
                            <th>Estado</th>
                            <th>Motivo</th>
                            <th>Observaciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaAusencias">
                        <tr><td colspan="4" style="text-align:center; padding: 30px;">Actualizando datos...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        // Lógica del Carrusel
        let idx = 0;
        setInterval(() => {
            const slides = document.getElementById("slides");
            if(slides) {
                idx = (idx + 1) % 5;
                slides.style.transform = `translateX(-${idx * 100}%)`;
            }
        }, 5000);

        // Conexión Supabase
        const SUPABASE_URL = 'https://etdcmuikvtnqfcnlvodh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0ZGNtdWlrdnRucWZjbmx2b2RoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1OTQ1ODcsImV4cCI6MjA5MTE3MDU4N30.8JHWlTxYRSYEkpipqesHVBKn7QomTXJYHp6Nm6SzU4A';
        const headers = { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}`, "Content-Type": "application/json" };

        async function cargarComunicados() {
            const contenedor = document.getElementById("contenedorComunicados");
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/comunicados?select=*&order=creado_en.desc&limit=6`, { headers });
                const datos = await res.json();
                if (!datos || datos.length === 0) {
                    contenedor.innerHTML = "<p style='grid-column:1/-1; text-align:center;'>No hay anuncios para mostrar.</p>";
                    return;
                }
                contenedor.innerHTML = "";
                datos.forEach(c => {
                    contenedor.innerHTML += `
                        <div class="comunicado-card">
                            <span class="meta">${c.autor || 'Dirección'}</span>
                            <h3>${c.titulo}</h3>
                            <p>${c.contenido}</p>
                        </div>`;
                });
            } catch (e) { contenedor.innerHTML = "<p>Error al conectar con el servidor.</p>"; }
        }

        async function cargarAusencias() {
            const tabla = document.getElementById("tablaAusencias");
            const hoy = new Date().toISOString().split('T')[0];
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/ausencias?fecha=lte.${hoy}&fecha_fin=gte.${hoy}&select=*`, { headers });
                const datos = await res.json();
                if (!datos || datos.length === 0) {
                    tabla.innerHTML = "<tr><td colspan='4' style='text-align:center; padding:20px;'>No hay ausencias reportadas para hoy.</td></tr>";
                    return;
                }
                tabla.innerHTML = "";
                datos.forEach(a => {
                    tabla.innerHTML += `
                        <tr>
                            <td><strong>${a.nombre}</strong></td>
                            <td style="color:#c62828; font-weight:bold;">Ausente</td>
                            <td><span class="badge-motivo">${a.razon}</span></td>
                            <td><small>${a.actividad || 'Sin indicaciones adicionales'}</small></td>
                        </tr>`;
                });
            } catch (e) { tabla.innerHTML = "<tr><td colspan='4'>Error de conexión.</td></tr>"; }
        }

        window.onload = () => { cargarComunicados(); cargarAusencias(); };
    </script>
</body>
</html>
