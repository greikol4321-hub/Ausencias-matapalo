<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Colegio</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* HEADER */
.header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background-color: #0a3d62;
    padding: 10px 20px;
    color: white;
}

.center {
    text-align: center;
    width: 60%;
}

.center img {
    width: 100px;
}

.right {
    display: flex;
    gap: 10px;
}

.btn {
    padding: 8px 12px;
    text-decoration: none;
    color: white;
    border-radius: 5px;
}

.btn-registro { background-color: #38ada9; }
.btn-login { background-color: #e58e26; }

/* SECCIÓN */
.seccion-blanca {
    padding: 30px;
}

/* CONTENEDOR CENTRADO */
.contenedor {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 50px;
}

/* LOGO */
.steam img {
    width: 100px;
}

/* CARRUSEL */
.carousel-container {
    width: 60%;
    text-align: center;
}

.carousel {
    position: relative;
    width: 100%;
    height: 320px;
    overflow: hidden;
    border-radius: 12px;
}

/* IMÁGENES CENTRADAS SIN RECORTE */
.slides img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: contain; /* 🔥 NO SE CORTA */
    background-color: #ffffff; /* fondo limpio */
    opacity: 0;
    transition: opacity 0.8s ease-in-out;
}

.slides img.active {
    opacity: 1;
}

/* BOTONES */
.prev, .next {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background-color: rgba(0,0,0,0.5);
    color: white;
    border: none;
    padding: 10px 14px;
    cursor: pointer;
    font-size: 18px;
    border-radius: 5px;
}

.prev { left: 10px; }
.next { right: 10px; }

/* RESPONSIVE */
@media (max-width: 768px) {
    .contenedor {
        flex-direction: column;
    }

    .carousel-container {
        width: 95%;
    }

    .carousel {
        height: 220px;
    }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div></div>

    <div class="center">
        <img src="escudo sin fondo.png">
        <h1>Colegio Técnico Profesional de Matapalo</h1>
    </div>

    <div class="right">
        <a href="registro-docentes.html" class="btn btn-registro">Registro Docente</a>
        <a href="registrarme.html" class="btn btn-login">Iniciar Sesión</a>
    </div>
</div>

<!-- SECCIÓN -->
<div class="seccion-blanca">

    <div class="contenedor">

        <!-- LOGO -->
        <div class="steam">
            <img src="steam.png">
        </div>

        <!-- CARRUSEL -->
        <div class="carousel-container">

            <h2>Anuncios del Colegio</h2>

            <div class="carousel" id="carousel1">
                <div class="slides">
                    <img src="1.jpeg" class="active">
                    <img src="2.jpeg">
                    <img src="3.jpeg">
                    <img src="4.jpeg">
                    <img src="5.jpeg">
                </div>

                <button class="prev" onclick="cambiar(-1)">❮</button>
                <button class="next" onclick="cambiar(1)">❯</button>
            </div>

        </div>

    </div>

</div>

<script>
let index = 0;
let slides = document.querySelectorAll("#carousel1 .slides img");

/* MOSTRAR */
function mostrar(i) {
    slides.forEach(img => img.classList.remove("active"));
    slides[i].classList.add("active");
}

/* CAMBIAR */
function cambiar(direccion) {
    index += direccion;

    if (index < 0) index = slides.length - 1;
    if (index >= slides.length) index = 0;

    mostrar(index);
}

/* AUTO + PAUSA */
let intervalo = setInterval(() => cambiar(1), 4000);

let carrusel = document.getElementById("carousel1");

carrusel.addEventListener("mouseenter", () => {
    clearInterval(intervalo);
});

carrusel.addEventListener("mouseleave", () => {
    intervalo = setInterval(() => cambiar(1), 4000);
});
</script>

</body>
</html>
